name: Export Drawio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export drawio files
        uses: rlespinasse/drawio-export-action@v3
        with:
          format: svg
          transparent: true
      - name: Move SVGs
        run: |
          find . -name "*.svg" -exec cp {} . \;
          git status
      - name: Commit and Push SVG
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add *.svg
          git commit -m "docs: Auto-export drawio to SVG" || echo "No changes to commit"
          git push || echo "Push failed"
